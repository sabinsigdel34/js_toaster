<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add User</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    min-height: 100vh;
    font-family: 'Sora', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem;
    gap: 3rem;
  }

  /* ── Form Card ── */
  .form-card {
    background: #161618;
    border: 1px solid #2a2a2d;
    border-radius: 20px;
    padding: 2.5rem 2.5rem 2rem;
    width: 100%;
    max-width: 500px;
  }

  .form-card h2 {
    color: #f0f0f0;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 2rem;
    letter-spacing: -0.02em;
  }

  .field { margin-bottom: 1.3rem; }

  .field label {
    display: block;
    color: #999;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .field input,
  .field textarea {
    width: 100%;
    background: #202023;
    border: 1px solid #2e2e32;
    border-radius: 10px;
    color: #eee;
    font-size: 14px;
    font-family: 'Sora', sans-serif;
    outline: none;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .field input { height: 44px; }
  .field textarea { height: 100px; resize: vertical; }

  .field input:focus,
  .field textarea:focus {
    border-color: #555;
  }

  .field input::placeholder,
  .field textarea::placeholder {
    color: #444;
  }

  .btn-submit {
    width: 100%;
    height: 48px;
    margin-top: 0.4rem;
    background: #252528;
    border: 1px solid #3a3a3e;
    border-radius: 12px;
    color: #e8e8e8;
    font-size: 14px;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }

  .btn-submit:hover { background: #2f2f33; border-color: #4a4a50; }
  .btn-submit:active { transform: scale(0.99); background: #3a3a3e; }

  /* ── Cards Grid ── */
  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.4rem;
    width: 100%;
    max-width: 860px;
  }

  .user-card {
    background: #161618;
    border: 1px solid #232326;
    border-radius: 20px;
    padding: 2rem 1.5rem 1.8rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    transition: border-color 0.2s, transform 0.2s;
  }

  .user-card:hover {
    border-color: #3a3a3e;
    transform: translateY(-3px);
  }

  .avatar-wrap {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 1.1rem;
    border: 2px solid #2e2e32;
    flex-shrink: 0;
  }

  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .user-name {
    color: #f0f0f0;
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .user-role {
    color: #666;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: center;
    margin-bottom: 10px;
  }

  .user-bio {
    color: #888;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

  <form class="form-card">
    <h2>Add User</h2>

    <div class="field">
      <label>Name</label>
      <input type="text" placeholder="Full name">
    </div>

    <div class="field">
      <label>Role</label>
      <input type="text" placeholder="Job title">
    </div>

    <div class="field">
      <label>Bio</label>
      <textarea placeholder="A short bio..."></textarea>
    </div>

    <div class="field">
      <label>Photo URL</label>
      <input type="text" placeholder="https://images.unsplash.com/...">
    </div>

    <button class="btn-submit">Submit</button>
  </form>
